name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open Frame Studio ${version}`,
              body: `## Open Frame Studio ${version}\n\nParametrische kozijntekensoftware voor de bouwsector.\n\n### Downloads\n- **Windows (System)**: Download de \`*_x64-setup.exe\` installer (vereist admin)\n- **Windows (User)**: Download de \`*_x64_user-setup.exe\` installer (geen admin nodig)\n- **Linux**: Download het \`.deb\` pakket of \`.AppImage\`\n\n### Kenmerken\n- Parametrisch kozijnontwerp met grid-editor\n- IFC / DXF / PDF export\n- Kozijnprofielen database (hout, PVC, aluminium)\n- Blender/Bonsai integratie\n- Kozijnstaat en werkplaatstekeningen`,
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'linux'
          - platform: 'windows-latest'
            target: 'windows-system'
          - platform: 'windows-latest'
            target: 'windows-user'

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Set user install mode
        if: matrix.target == 'windows-user'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if (-not $conf.bundle.PSObject.Properties['windows']) {
            $conf.bundle | Add-Member -NotePropertyName 'windows' -NotePropertyValue @{}
          }
          if (-not $conf.bundle.windows.PSObject.Properties['nsis']) {
            $conf.bundle.windows | Add-Member -NotePropertyName 'nsis' -NotePropertyValue @{}
          }
          $conf.bundle.windows.nsis.installMode = "currentUser"
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app
        if: matrix.target != 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

      - name: Build Tauri app (user installer)
        if: matrix.target == 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri

      - name: Upload user installer to release
        if: matrix.target == 'windows-user'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $NSIS_DIR = "src-tauri/target/release/bundle/nsis"
          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $NEW_NAME = $EXE.Name -replace '_x64-setup\.exe$', '_x64_user-setup.exe'
          $NEW_PATH = Join-Path $EXE.DirectoryName $NEW_NAME
          Rename-Item $EXE.FullName $NEW_PATH
          gh release upload $VERSION "$NEW_PATH" --clobber --repo "${{ github.repository }}"
          Write-Host "Uploaded user installer: $NEW_NAME"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build]

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
